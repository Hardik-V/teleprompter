<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Prompter" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>Prompter</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #000;
      --text: #ffffff;
      --accent: #e8e0d0;
      --muted: #444;
      --control-bg: rgba(15,15,15,0.92);
      --font-size: 36px;
      --speed: 1;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Serif Display', Georgia, serif;
      overflow: hidden;
      user-select: none;
    }

    /* ─── EDITOR SCREEN ─── */
    #editor-screen {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 0;
      background: #000;
    }

    .editor-header {
      padding: 28px 32px 20px;
      border-bottom: 1px solid #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .app-title {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #555;
    }

    .app-wordmark {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: var(--accent);
      letter-spacing: -0.02em;
    }

    .editor-controls {
      padding: 18px 32px;
      display: flex;
      gap: 32px;
      align-items: center;
      border-bottom: 1px solid #111;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .control-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #555;
      white-space: nowrap;
    }

    .slider-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    input[type=range] {
      -webkit-appearance: none;
      width: 90px;
      height: 2px;
      background: #222;
      border-radius: 1px;
      outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.15s;
    }
    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.3); }

    .val-display {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: #666;
      min-width: 28px;
    }

    .scroll-mode-toggle {
      display: flex;
      gap: 0;
      border: 1px solid #222;
      border-radius: 4px;
      overflow: hidden;
    }
    .scroll-mode-toggle button {
      background: none;
      border: none;
      color: #555;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 6px 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .scroll-mode-toggle button.active {
      background: #1a1a1a;
      color: var(--accent);
    }

    .textarea-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #script-input {
      width: 100%; height: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: #ccc;
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      line-height: 1.8;
      padding: 24px 32px;
      resize: none;
      caret-color: var(--accent);
    }
    #script-input::placeholder { color: #2a2a2a; }

    .start-btn {
      margin: 20px 32px 28px;
      flex-shrink: 0;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 6px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      font-weight: 500;
      padding: 16px 32px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .start-btn:hover { background: #fff; transform: translateY(-1px); }
    .start-btn:active { transform: translateY(0); }

    .start-icon {
      width: 0; height: 0;
      border-style: solid;
      border-width: 6px 0 6px 10px;
      border-color: transparent transparent transparent #000;
    }

    /* ─── PROMPTER SCREEN ─── */
    #prompter-screen {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      overflow: hidden;
      cursor: none;
    }

    #scroll-container {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    #scroll-content {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: min(760px, 90vw);
      padding: 100vh 0 60vh;
      will-change: transform;
    }

    #scroll-content p {
      font-family: 'DM Serif Display', serif;
      font-size: var(--font-size);
      line-height: 1.55;
      color: var(--text);
      text-align: center;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* fade overlays */
    .fade-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 42%;
      background: linear-gradient(to bottom,
        rgba(0,0,0,1) 0%,
        rgba(0,0,0,0.97) 25%,
        rgba(0,0,0,0.85) 50%,
        rgba(0,0,0,0.4) 75%,
        rgba(0,0,0,0) 100%
      );
      pointer-events: none;
      z-index: 10;
    }

    .fade-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 28%;
      background: linear-gradient(to top,
        rgba(0,0,0,1) 0%,
        rgba(0,0,0,0.7) 50%,
        rgba(0,0,0,0) 100%
      );
      pointer-events: none;
      z-index: 10;
    }

    /* reading line */
    .reading-line {
      position: absolute;
      top: 42%;
      left: 50%;
      transform: translate(-50%, -1px);
      width: min(760px, 90vw);
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(232,224,208,0.12) 20%, rgba(232,224,208,0.12) 80%, transparent);
      z-index: 11;
      pointer-events: none;
    }

    /* progress bar */
    #progress-bar {
      position: absolute;
      bottom: 0; left: 0;
      height: 2px;
      background: rgba(232,224,208,0.35);
      z-index: 20;
      transition: width 0.1s linear;
      width: 0%;
    }

    /* HUD controls */
    #hud {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--control-bg);
      border: 1px solid #1e1e1e;
      border-radius: 50px;
      padding: 10px 18px;
      z-index: 30;
      transition: opacity 0.4s, transform 0.4s;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    #hud.hidden {
      opacity: 0;
      transform: translateX(-50%) translateY(12px);
      pointer-events: none;
    }

    .hud-btn {
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      padding: 6px 8px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s, background 0.2s;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      gap: 4px;
    }
    .hud-btn:hover { color: var(--accent); background: rgba(255,255,255,0.05); }
    .hud-btn svg { width: 16px; height: 16px; fill: currentColor; }

    .hud-divider {
      width: 1px; height: 20px;
      background: #222;
      flex-shrink: 0;
    }

    .hud-val {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: #555;
      min-width: 22px;
      text-align: center;
    }

    /* manual tap zones */
    #tap-left, #tap-right {
      position: absolute;
      top: 0; bottom: 0;
      width: 40%;
      z-index: 5;
      display: none;
    }
    #tap-left { left: 0; }
    #tap-right { right: 0; }

    body.manual-mode #tap-left,
    body.manual-mode #tap-right { display: block; }

    /* tap flash feedback */
    .tap-flash {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 60px; height: 60px;
      border-radius: 50%;
      background: rgba(232,224,208,0.12);
      animation: tapFlash 0.35s ease-out forwards;
      pointer-events: none;
      z-index: 50;
    }
    @keyframes tapFlash {
      0% { opacity:1; transform: translate(-50%,-50%) scale(0.5); }
      100% { opacity:0; transform: translate(-50%,-50%) scale(2); }
    }

    /* pause overlay */
    #pause-indicator {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.15);
      z-index: 12;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }
    #pause-indicator.visible { opacity: 1; }

    /* end screen */
    #end-screen {
      display: none;
      position: absolute;
      inset: 0;
      background: #000;
      z-index: 40;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
    }
    #end-screen.visible { display: flex; }
    .end-title {
      font-family: 'DM Serif Display', serif;
      font-size: 32px;
      color: var(--accent);
      opacity: 0.6;
    }
    .end-sub {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      color: #444;
      text-transform: uppercase;
    }
    .end-actions {
      display: flex;
      gap: 12px;
      margin-top: 12px;
    }
    .end-btn {
      background: none;
      border: 1px solid #222;
      color: #666;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 12px 24px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .end-btn:hover { border-color: #444; color: var(--accent); }
    .end-btn.primary { border-color: #333; background: #111; color: var(--accent); }

    /* install banner */
    #install-banner {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0;
      background: #111;
      border-bottom: 1px solid #1e1e1e;
      padding: 12px 20px;
      z-index: 100;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    #install-banner.visible { display: flex; }
    .install-text {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: #666;
      letter-spacing: 0.1em;
    }
    .install-text strong { color: var(--accent); }
    .install-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .install-btn {
      background: var(--accent);
      color: #000;
      border: none;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
    }
    .install-dismiss {
      background: none;
      border: 1px solid #2a2a2a;
      color: #555;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<!-- Install Banner -->
<div id="install-banner">
  <span class="install-text"><strong>Install Prompter</strong> — run without browser UI</span>
  <div class="install-actions">
    <button class="install-btn" id="install-btn">Install</button>
    <button class="install-dismiss" id="install-dismiss">Later</button>
  </div>
</div>

<!-- ─── EDITOR SCREEN ─── -->
<div id="editor-screen">
  <div class="editor-header">
    <span class="app-wordmark">Prompter</span>
    <span class="app-title">Teleprompter</span>
  </div>

  <div class="editor-controls">
    <div class="control-group">
      <span class="control-label">Mode</span>
      <div class="scroll-mode-toggle">
        <button id="mode-auto" class="active" onclick="setMode('auto')">Auto</button>
        <button id="mode-manual" onclick="setMode('manual')">Manual</button>
      </div>
    </div>

    <div class="control-group" id="speed-control">
      <span class="control-label">Speed</span>
      <div class="slider-wrap">
        <input type="range" id="speed-slider" min="0.3" max="5" step="0.1" value="1.2"
          oninput="updateSpeed(this.value)" />
        <span class="val-display" id="speed-val">1.2</span>
      </div>
    </div>

    <div class="control-group">
      <span class="control-label">Size</span>
      <div class="slider-wrap">
        <input type="range" id="size-slider" min="20" max="72" step="2" value="36"
          oninput="updateSize(this.value)" />
        <span class="val-display" id="size-val">36</span>
      </div>
    </div>
  </div>

  <div class="textarea-wrap">
    <textarea id="script-input" placeholder="Paste or type your script here...&#10;&#10;When you're ready, hit Begin."></textarea>
  </div>

  <button class="start-btn" onclick="startPrompter()">
    <span class="start-icon"></span>
    Begin
  </button>
</div>

<!-- ─── PROMPTER SCREEN ─── -->
<div id="prompter-screen">
  <div id="scroll-container">
    <div id="scroll-content">
      <p id="script-text"></p>
    </div>
  </div>

  <div class="fade-top"></div>
  <div class="fade-bottom"></div>
  <div class="reading-line"></div>
  <div id="progress-bar"></div>
  <div id="pause-indicator">Paused</div>

  <!-- manual tap zones -->
  <div id="tap-left" onclick="manualBack()"></div>
  <div id="tap-right" onclick="manualForward()"></div>

  <!-- HUD -->
  <div id="hud">
    <!-- restart -->
    <button class="hud-btn" onclick="restartScroll()" title="Restart">
      <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.96 7.96 0 0012 4c-4.42 0-8 3.58-8 8s3.58 8 8 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
    </button>

    <div class="hud-divider"></div>

    <!-- play/pause -->
    <button class="hud-btn" id="play-btn" onclick="togglePlayPause()" title="Play/Pause">
      <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      <svg id="pause-icon" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
    </button>

    <div class="hud-divider"></div>

    <!-- speed -->
    <button class="hud-btn" onclick="adjustSpeed(-0.2)">−</button>
    <span class="hud-val" id="hud-speed">1.2</span>
    <button class="hud-btn" onclick="adjustSpeed(0.2)">+</button>

    <div class="hud-divider"></div>

    <!-- font size -->
    <button class="hud-btn" onclick="adjustSize(-2)">
      <svg viewBox="0 0 24 24"><path d="M9 4v3h5v12h3V7h5V4H9zm-6 8h3v7h3v-7h3V9H3v3z"/></svg>
      <span>−</span>
    </button>
    <button class="hud-btn" onclick="adjustSize(2)">
      <svg viewBox="0 0 24 24"><path d="M9 4v3h5v12h3V7h5V4H9zm-6 8h3v7h3v-7h3V9H3v3z"/></svg>
      <span>+</span>
    </button>

    <div class="hud-divider"></div>

    <!-- exit -->
    <button class="hud-btn" onclick="exitPrompter()" title="Edit">
      <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 000-1.41l-2.34-2.34a1 1 0 00-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
    </button>
  </div>

  <!-- End screen -->
  <div id="end-screen">
    <div class="end-title">End of script.</div>
    <div class="end-sub">That's a wrap</div>
    <div class="end-actions">
      <button class="end-btn" onclick="restartScroll(); hideEndScreen()">Restart</button>
      <button class="end-btn primary" onclick="exitPrompter()">Edit Script</button>
    </div>
  </div>
</div>

<script>
  // ─── STATE ───
  let scrollPos = 0;
  let isPlaying = false;
  let animFrame = null;
  let mode = 'auto';
  let speed = 1.2;
  let fontSize = 36;
  let hudTimeout = null;
  let totalHeight = 0;
  let manualStep = 0;
  let deferredPrompt = null;

  const LINES_PER_TAP = 3; // lines to advance per manual tap

  // ─── INIT ───
  window.addEventListener('load', () => {
    // restore saved script
    const saved = localStorage.getItem('prompter_script');
    if (saved) document.getElementById('script-input').value = saved;

    const savedSpeed = localStorage.getItem('prompter_speed');
    if (savedSpeed) {
      speed = parseFloat(savedSpeed);
      document.getElementById('speed-slider').value = speed;
      document.getElementById('speed-val').textContent = speed.toFixed(1);
      document.getElementById('hud-speed').textContent = speed.toFixed(1);
    }

    const savedSize = localStorage.getItem('prompter_size');
    if (savedSize) {
      fontSize = parseInt(savedSize);
      document.getElementById('size-slider').value = fontSize;
      document.getElementById('size-val').textContent = fontSize;
      document.root?.style.setProperty('--font-size', fontSize + 'px');
    }
  });

  // ─── PWA INSTALL ───
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    if (!localStorage.getItem('install_dismissed')) {
      document.getElementById('install-banner').classList.add('visible');
    }
  });

  document.getElementById('install-btn').onclick = async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    document.getElementById('install-banner').classList.remove('visible');
  };

  document.getElementById('install-dismiss').onclick = () => {
    localStorage.setItem('install_dismissed', '1');
    document.getElementById('install-banner').classList.remove('visible');
  };

  // ─── EDITOR CONTROLS ───
  function setMode(m) {
    mode = m;
    document.getElementById('mode-auto').classList.toggle('active', m === 'auto');
    document.getElementById('mode-manual').classList.toggle('active', m === 'manual');
    document.getElementById('speed-control').style.display = m === 'auto' ? 'flex' : 'none';
  }

  function updateSpeed(val) {
    speed = parseFloat(val);
    document.getElementById('speed-val').textContent = parseFloat(val).toFixed(1);
    document.getElementById('hud-speed').textContent = parseFloat(val).toFixed(1);
    localStorage.setItem('prompter_speed', speed);
  }

  function updateSize(val) {
    fontSize = parseInt(val);
    document.getElementById('size-val').textContent = val;
    document.documentElement.style.setProperty('--font-size', val + 'px');
    localStorage.setItem('prompter_size', fontSize);
    // recalc manual step
    manualStep = fontSize * LINES_PER_TAP * 1.55;
  }

  function adjustSpeed(delta) {
    speed = Math.min(5, Math.max(0.3, +(speed + delta).toFixed(1)));
    document.getElementById('speed-slider').value = speed;
    document.getElementById('speed-val').textContent = speed.toFixed(1);
    document.getElementById('hud-speed').textContent = speed.toFixed(1);
    localStorage.setItem('prompter_speed', speed);
    showHud();
  }

  function adjustSize(delta) {
    fontSize = Math.min(72, Math.max(20, fontSize + delta));
    document.getElementById('size-slider').value = fontSize;
    document.getElementById('size-val').textContent = fontSize;
    document.documentElement.style.setProperty('--font-size', fontSize + 'px');
    localStorage.setItem('prompter_size', fontSize);
    manualStep = fontSize * LINES_PER_TAP * 1.55;
    recalcTotal();
    showHud();
  }

  // ─── START ───
  function startPrompter() {
    const text = document.getElementById('script-input').value.trim();
    if (!text) return;
    localStorage.setItem('prompter_script', text);

    document.getElementById('script-text').textContent = text;
    document.documentElement.style.setProperty('--font-size', fontSize + 'px');

    scrollPos = 0;
    document.getElementById('scroll-content').style.transform = `translateY(0px)`;

    document.getElementById('editor-screen').style.display = 'none';
    document.getElementById('prompter-screen').style.display = 'block';

    if (mode === 'manual') {
      document.body.classList.add('manual-mode');
    } else {
      document.body.classList.remove('manual-mode');
    }

    requestAnimationFrame(() => {
      recalcTotal();
      manualStep = fontSize * LINES_PER_TAP * 1.55;
      if (mode === 'auto') {
        isPlaying = true;
        updatePlayBtn();
        startScrollLoop();
      } else {
        isPlaying = false;
        updatePlayBtn();
      }
      showHud();
    });

    // hide cursor after delay
    document.getElementById('prompter-screen').addEventListener('mousemove', handleMouseMove);
    // tap to pause (center area)
    document.getElementById('scroll-container').addEventListener('click', handleCenterTap);
    // keyboard
    document.addEventListener('keydown', handleKey);
    // touch pause
    document.getElementById('scroll-container').addEventListener('touchstart', handleTouch, {passive:true});
  }

  function recalcTotal() {
    const content = document.getElementById('scroll-content');
    const container = document.getElementById('scroll-container');
    totalHeight = content.scrollHeight - container.clientHeight;
  }

  // ─── SCROLL LOOP ───
  let lastTime = null;
  function startScrollLoop() {
    lastTime = null;
    animFrame = requestAnimationFrame(scrollStep);
  }

  function scrollStep(ts) {
    if (!isPlaying) return;
    if (lastTime === null) lastTime = ts;
    const delta = (ts - lastTime) / 1000;
    lastTime = ts;

    scrollPos += speed * 60 * delta;

    if (scrollPos >= totalHeight) {
      scrollPos = totalHeight;
      applyScroll();
      updateProgress();
      stopScroll();
      showEndScreen();
      return;
    }

    applyScroll();
    updateProgress();
    animFrame = requestAnimationFrame(scrollStep);
  }

  function applyScroll() {
    document.getElementById('scroll-content').style.transform =
      `translateX(-50%) translateY(${-scrollPos}px)`;
  }

  function updateProgress() {
    const pct = totalHeight > 0 ? (scrollPos / totalHeight) * 100 : 0;
    document.getElementById('progress-bar').style.width = pct + '%';
  }

  function stopScroll() {
    isPlaying = false;
    if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
    updatePlayBtn();
    showPauseIndicator();
  }

  // ─── PLAY / PAUSE ───
  function togglePlayPause() {
    if (mode === 'manual') return;
    if (isPlaying) {
      stopScroll();
    } else {
      if (scrollPos >= totalHeight) restartScroll();
      isPlaying = true;
      updatePlayBtn();
      hidePauseIndicator();
      startScrollLoop();
    }
    showHud();
  }

  function handleCenterTap(e) {
    // only if not tapping HUD
    if (e.target.closest('#hud') || e.target.closest('#tap-left') || e.target.closest('#tap-right')) return;
    if (mode === 'auto') {
      togglePlayPause();
      spawnTapFlash(e.clientX, e.clientY);
    }
  }

  function handleTouch(e) {
    if (e.target.closest('#hud') || e.target.closest('#tap-left') || e.target.closest('#tap-right')) return;
    if (mode === 'auto') togglePlayPause();
  }

  function updatePlayBtn() {
    document.getElementById('play-icon').style.display = isPlaying ? 'none' : 'block';
    document.getElementById('pause-icon').style.display = isPlaying ? 'block' : 'none';
  }

  // ─── MANUAL MODE ───
  function manualForward() {
    scrollPos = Math.min(totalHeight, scrollPos + manualStep);
    applyScroll();
    updateProgress();
    if (scrollPos >= totalHeight) showEndScreen();
    spawnTapFlashCenter('right');
  }

  function manualBack() {
    scrollPos = Math.max(0, scrollPos - manualStep);
    applyScroll();
    updateProgress();
    spawnTapFlashCenter('left');
  }

  // ─── RESTART ───
  function restartScroll() {
    scrollPos = 0;
    applyScroll();
    updateProgress();
    if (mode === 'auto') {
      isPlaying = true;
      updatePlayBtn();
      hidePauseIndicator();
      startScrollLoop();
    }
    showHud();
  }

  // ─── EXIT ───
  function exitPrompter() {
    stopScroll();
    document.getElementById('prompter-screen').style.display = 'none';
    document.getElementById('editor-screen').style.display = 'flex';
    document.getElementById('end-screen').classList.remove('visible');
    document.removeEventListener('keydown', handleKey);
    document.getElementById('scroll-container').removeEventListener('click', handleCenterTap);
    document.getElementById('prompter-screen').removeEventListener('mousemove', handleMouseMove);
  }

  // ─── END SCREEN ───
  function showEndScreen() {
    document.getElementById('end-screen').classList.add('visible');
  }
  function hideEndScreen() {
    document.getElementById('end-screen').classList.remove('visible');
  }

  // ─── HUD ───
  function showHud() {
    const hud = document.getElementById('hud');
    hud.classList.remove('hidden');
    clearTimeout(hudTimeout);
    hudTimeout = setTimeout(() => hud.classList.add('hidden'), 3000);
    document.getElementById('prompter-screen').style.cursor = 'default';
  }

  let cursorHideTimeout = null;
  function handleMouseMove() {
    showHud();
    clearTimeout(cursorHideTimeout);
    cursorHideTimeout = setTimeout(() => {
      document.getElementById('prompter-screen').style.cursor = 'none';
    }, 3000);
  }

  // ─── PAUSE INDICATOR ───
  function showPauseIndicator() {
    document.getElementById('pause-indicator').classList.add('visible');
  }
  function hidePauseIndicator() {
    document.getElementById('pause-indicator').classList.remove('visible');
  }

  // ─── KEYBOARD ───
  function handleKey(e) {
    switch(e.code) {
      case 'Space': e.preventDefault(); togglePlayPause(); break;
      case 'ArrowUp': adjustSpeed(0.2); break;
      case 'ArrowDown': adjustSpeed(-0.2); break;
      case 'ArrowRight': if(mode==='manual') manualForward(); break;
      case 'ArrowLeft': if(mode==='manual') manualBack(); break;
      case 'KeyR': restartScroll(); break;
      case 'Escape': exitPrompter(); break;
      case 'Equal': case 'NumpadAdd': adjustSize(2); break;
      case 'Minus': case 'NumpadSubtract': adjustSize(-2); break;
    }
  }

  // ─── TAP FLASH ───
  function spawnTapFlash(x, y) {
    const el = document.createElement('div');
    el.className = 'tap-flash';
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    el.style.position = 'fixed';
    document.getElementById('prompter-screen').appendChild(el);
    setTimeout(() => el.remove(), 400);
  }

  function spawnTapFlashCenter(side) {
    const screen = document.getElementById('prompter-screen');
    const x = side === 'right' ? screen.clientWidth * 0.75 : screen.clientWidth * 0.25;
    const y = screen.clientHeight * 0.5;
    spawnTapFlash(x, y);
  }

  // ─── SERVICE WORKER ───
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>
</body>
</html>
