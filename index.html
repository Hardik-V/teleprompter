<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Prompter" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>Prompter</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #000;
      --text: #ffffff;
      --accent: #e8e0d0;
      --control-bg: rgba(15,15,15,0.94);
      --font-size: 36px;
      --content-width: 760px;
      --text-align: left;
      --line-height: 1.58;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Serif Display', Georgia, serif;
      overflow: hidden;
      user-select: none;
    }

    /* ─── EDITOR ─── */
    #editor-screen {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #000;
    }

    .editor-header {
      padding: 24px 28px 18px;
      border-bottom: 1px solid #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .app-wordmark {
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      color: var(--accent);
      letter-spacing: -0.02em;
    }

    .app-title {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #444;
    }

    .editor-controls {
      padding: 14px 28px;
      display: flex;
      gap: 22px;
      align-items: center;
      border-bottom: 1px solid #111;
      flex-shrink: 0;
      flex-wrap: wrap;
      row-gap: 10px;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .control-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #484848;
      white-space: nowrap;
    }

    .slider-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    input[type=range] {
      -webkit-appearance: none;
      width: 80px;
      height: 2px;
      background: #1e1e1e;
      border-radius: 1px;
      outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 13px; height: 13px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.15s;
    }
    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.3); }

    .val-display {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: #555;
      min-width: 26px;
    }

    .toggle-group {
      display: flex;
      border: 1px solid #1e1e1e;
      border-radius: 4px;
      overflow: hidden;
    }
    .toggle-group button {
      background: none;
      border: none;
      color: #484848;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 5px 12px;
      cursor: pointer;
      transition: all 0.18s;
      white-space: nowrap;
    }
    .toggle-group button.active {
      background: #141414;
      color: var(--accent);
    }
    .toggle-group button + button {
      border-left: 1px solid #1e1e1e;
    }

    .textarea-wrap { flex: 1; min-height: 180px; overflow: hidden; padding-bottom: 60px; }

    #script-input {
      width: 100%; height: 100%;
      background: transparent;
      border: none; outline: none;
      color: #bbb;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      line-height: 1.85;
      padding: 20px 28px;
      resize: none;
      caret-color: var(--accent);
    }
    #script-input::placeholder { color: #232323; }

    .start-btn {
      margin: 0;
      flex-shrink: 0;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 0;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      font-weight: 500;
      padding: 18px 28px;
      cursor: pointer;
      transition: all 0.18s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      width: 100%;
      z-index: 10;
    }
    .start-btn:hover { background: #fff; transform: translateY(-1px); }
    .start-btn:active { transform: translateY(0); }

    .start-icon {
      width: 0; height: 0;
      border-style: solid;
      border-width: 5px 0 5px 9px;
      border-color: transparent transparent transparent #000;
    }

    @media (max-height: 700px) {
      .editor-header { padding: 14px 20px 12px; }
      .editor-controls { padding: 10px 20px; gap: 14px; }
      #script-input { padding: 14px 20px; font-size: 12px; }
    }

    @media (max-width: 480px) {
      .editor-controls { padding: 10px 16px; gap: 12px; }
      #script-input { padding: 14px 16px; }
    }

    /* ─── PROMPTER ─── */
    #prompter-screen {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      overflow: hidden;
      cursor: none;
    }

    #scroll-container {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    #scroll-content {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: min(var(--content-width), 92vw);
      padding: 50vh 0 60vh;
      will-change: transform;
    }

    #script-lines {
      font-family: 'DM Serif Display', serif;
      font-size: var(--font-size);
      line-height: var(--line-height);
      text-align: var(--text-align);
      word-break: break-word;
    }

    .script-line {
      display: block;
      transition: opacity 0.3s ease, color 0.3s ease;
      padding: 0 4px;
    }

    /* confidence levels */
    .line-active {
      opacity: 1 !important;
      color: #ffffff !important;
      background: rgba(232,224,208,0.04);
      border-radius: 3px;
    }
    .line-near  { opacity: 0.55 !important; color: #cccccc !important; }
    .line-far   { opacity: 0.18 !important; color: #aaaaaa !important; }
    .line-gone  { opacity: 0.07 !important; color: #888888 !important; }

    /* progress bar */
    #progress-bar {
      position: absolute;
      bottom: 0; left: 0;
      height: 2px;
      background: rgba(232,224,208,0.3);
      z-index: 20;
      width: 0%;
    }

    /* time remaining */
    #time-remaining {
      position: absolute;
      bottom: 12px;
      right: 18px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.16);
      z-index: 21;
      pointer-events: none;
    }

    /* HUD */
    #hud {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 5px;
      background: var(--control-bg);
      border: 1px solid #1c1c1c;
      border-radius: 50px;
      padding: 9px 16px;
      z-index: 30;
      transition: opacity 0.4s, transform 0.4s;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      white-space: nowrap;
    }
    #hud.hidden {
      opacity: 0;
      transform: translateX(-50%) translateY(14px);
      pointer-events: none;
    }

    .hud-btn {
      background: none;
      border: none;
      color: #606060;
      cursor: pointer;
      padding: 5px 7px;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      transition: color 0.18s, background 0.18s;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.06em;
    }
    .hud-btn:hover { color: var(--accent); background: rgba(255,255,255,0.05); }
    .hud-btn svg { width: 15px; height: 15px; fill: currentColor; flex-shrink: 0; }

    .hud-divider { width: 1px; height: 18px; background: #1e1e1e; flex-shrink: 0; }
    .hud-val {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: #484848;
      min-width: 20px;
      text-align: center;
    }

    /* manual tap zones */
    #tap-left, #tap-right {
      position: absolute;
      top: 0; bottom: 0;
      width: 40%;
      z-index: 5;
      display: none;
    }
    #tap-left  { left: 0; }
    #tap-right { right: 0; }
    body.manual-mode #tap-left,
    body.manual-mode #tap-right { display: block; }

    /* tap flash */
    .tap-flash {
      position: fixed;
      width: 56px; height: 56px;
      border-radius: 50%;
      background: rgba(232,224,208,0.1);
      animation: tapFlash 0.35s ease-out forwards;
      pointer-events: none;
      z-index: 50;
      transform: translate(-50%, -50%);
    }
    @keyframes tapFlash {
      0%   { opacity: 1; transform: translate(-50%,-50%) scale(0.4); }
      100% { opacity: 0; transform: translate(-50%,-50%) scale(2.2); }
    }

    /* pause indicator */
    #pause-indicator {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.12);
      z-index: 12;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }
    #pause-indicator.visible { opacity: 1; }

    /* rewind overlay */
    #rewind-overlay {
      display: none;
      position: absolute;
      inset: 0;
      z-index: 35;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    #rewind-overlay.active { display: flex; }
    .rewind-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(232,224,208,0.3);
      animation: rewindFade 0.7s ease-out forwards;
    }
    @keyframes rewindFade {
      0%   { opacity: 0; transform: translateY(6px); }
      25%  { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-4px); }
    }

    /* end screen */
    #end-screen {
      display: none;
      position: absolute;
      inset: 0;
      background: #000;
      z-index: 40;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    #end-screen.visible { display: flex; }
    .end-title {
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      color: var(--accent);
      opacity: 0.55;
    }
    .end-sub {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.22em;
      color: #383838;
      text-transform: uppercase;
    }
    .end-actions { display: flex; gap: 10px; margin-top: 10px; }
    .end-btn {
      background: none;
      border: 1px solid #1e1e1e;
      color: #555;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 11px 22px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.18s;
    }
    .end-btn:hover { border-color: #383838; color: var(--accent); }
    .end-btn.primary { border-color: #2a2a2a; background: #0d0d0d; color: var(--accent); }

    /* install banner */
    #install-banner {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0;
      background: #0d0d0d;
      border-bottom: 1px solid #1a1a1a;
      padding: 11px 20px;
      z-index: 100;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    #install-banner.visible { display: flex; }
    .install-text { font-family: 'DM Mono', monospace; font-size: 10px; color: #555; letter-spacing: 0.1em; }
    .install-text strong { color: var(--accent); }
    .install-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .install-btn {
      background: var(--accent); color: #000; border: none;
      font-family: 'DM Mono', monospace; font-size: 10px;
      letter-spacing: 0.15em; text-transform: uppercase;
      padding: 7px 14px; border-radius: 3px; cursor: pointer; font-weight: 500;
    }
    .install-dismiss {
      background: none; border: 1px solid #242424; color: #484848;
      font-family: 'DM Mono', monospace; font-size: 10px;
      letter-spacing: 0.15em; text-transform: uppercase;
      padding: 7px 11px; border-radius: 3px; cursor: pointer;
    }
  </style>
</head>
<body>

<div id="install-banner">
  <span class="install-text"><strong>Install Prompter</strong> — run without browser UI</span>
  <div class="install-actions">
    <button class="install-btn" id="install-btn">Install</button>
    <button class="install-dismiss" id="install-dismiss">Later</button>
  </div>
</div>

<!-- EDITOR -->
<div id="editor-screen">
  <div class="editor-header">
    <span class="app-wordmark">Prompter</span>
    <span class="app-title">Teleprompter</span>
  </div>

  <div class="editor-controls">

    <div class="control-group">
      <span class="control-label">Mode</span>
      <div class="toggle-group">
        <button id="mode-auto" class="active" onclick="setMode('auto')">Auto</button>
        <button id="mode-manual" onclick="setMode('manual')">Manual</button>
      </div>
    </div>

    <div class="control-group" id="speed-control">
      <span class="control-label">Speed</span>
      <div class="slider-wrap">
        <input type="range" id="speed-slider" min="0.1" max="5" step="0.1" value="1.2" oninput="updateSpeed(this.value)" />
        <span class="val-display" id="speed-val">1.2</span>
      </div>
    </div>

    <div class="control-group">
      <span class="control-label">Size</span>
      <div class="slider-wrap">
        <input type="range" id="size-slider" min="20" max="72" step="2" value="36" oninput="updateSize(this.value)" />
        <span class="val-display" id="size-val">36</span>
      </div>
    </div>

    <div class="control-group">
      <span class="control-label">Width</span>
      <div class="toggle-group">
        <button id="width-narrow" onclick="setWidth('narrow')">Narrow</button>
        <button id="width-mid" class="active" onclick="setWidth('mid')">Mid</button>
        <button id="width-wide" onclick="setWidth('wide')">Wide</button>
      </div>
    </div>

    <div class="control-group">
      <span class="control-label">Align</span>
      <div class="toggle-group">
        <button id="align-left" class="active" onclick="setAlign('left')">Left</button>
        <button id="align-center" onclick="setAlign('center')">Centre</button>
      </div>
    </div>

    <div class="control-group">
      <span class="control-label">Confidence</span>
      <div class="toggle-group">
        <button id="conf-on" class="active" onclick="setConfidence(true)">On</button>
        <button id="conf-off" onclick="setConfidence(false)">Off</button>
      </div>
    </div>

    <div class="control-group">
      <span class="control-label">Spacing</span>
      <div class="toggle-group">
        <button id="spacing-tight" onclick="setSpacing('tight')">Tight</button>
        <button id="spacing-normal" class="active" onclick="setSpacing('normal')">Normal</button>
        <button id="spacing-loose" onclick="setSpacing('loose')">Loose</button>
      </div>
    </div>

  </div>

  <div class="textarea-wrap">
    <textarea id="script-input" placeholder="Paste or type your script here...&#10;&#10;When you're ready, hit Begin." onkeydown="if((event.ctrlKey||event.metaKey)&&event.key==='Enter'){event.preventDefault();startPrompter();}"></textarea>
  </div>

  <button class="start-btn" onclick="startPrompter()">
    <span class="start-icon"></span>
    Begin
  </button>
</div>

<!-- PROMPTER -->
<div id="prompter-screen">
  <div id="scroll-container">
    <div id="scroll-content">
      <div id="script-lines"></div>
    </div>
  </div>

  <div id="progress-bar"></div>
  <div id="time-remaining">—</div>
  <div id="pause-indicator">Paused</div>

  <div id="rewind-overlay">
    <span class="rewind-label">↑ rewinding</span>
  </div>

  <div id="tap-left"  onclick="manualBack()"></div>
  <div id="tap-right" onclick="manualForward()"></div>

  <div id="hud">
    <button class="hud-btn" onclick="restartScroll()" title="Restart">
      <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.96 7.96 0 0012 4c-4.42 0-8 3.58-8 8s3.58 8 8 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
    </button>

    <div class="hud-divider"></div>

    <button class="hud-btn" id="play-btn" onclick="togglePlayPause()">
      <svg id="play-icon"  viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      <svg id="pause-icon" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
    </button>

    <div class="hud-divider"></div>

    <button class="hud-btn" onclick="adjustSpeed(-0.1)">−</button>
    <span class="hud-val" id="hud-speed">1.2</span>
    <button class="hud-btn" onclick="adjustSpeed(0.1)">+</button>

    <div class="hud-divider"></div>

    <button class="hud-btn" onclick="adjustSize(-2)">A−</button>
    <button class="hud-btn" onclick="adjustSize(2)">A+</button>

    <div class="hud-divider"></div>

    <button class="hud-btn" onclick="exitPrompter()" title="Edit">
      <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 000-1.41l-2.34-2.34a1 1 0 00-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
    </button>
  </div>

  <div id="end-screen">
    <div class="end-title">End of script.</div>
    <div class="end-sub">That's a wrap</div>
    <div class="end-actions">
      <button class="end-btn" onclick="restartScroll(); hideEndScreen()">Restart</button>
      <button class="end-btn primary" onclick="exitPrompter()">Edit Script</button>
    </div>
  </div>
</div>

<script>
  let scrollPos    = 0;
  let isPlaying    = false;
  let animFrame    = null;
  let mode         = 'auto';
  let speed        = 1.2;
  let fontSize     = 36;
  let contentWidth = 760;
  let textAlign    = 'left';
  let lineSpacing  = 'normal';
  let confidenceOn = true;
  let hudTimeout   = null;
  let totalHeight  = 0;
  let manualStep   = 0;
  let deferredPrompt = null;
  let lineElements = [];
  let lineOffsets  = [];
  let lastTime     = null;
  let isRewinding  = false;

  const LINES_PER_TAP = 3;
  const WIDTH_MAP = { narrow: 460, mid: 760, wide: 1040 };
  const SPACING_MAP = { tight: 1.35, normal: 1.58, loose: 2.0 };

  // ── INIT ──
  window.addEventListener('load', () => {
    const s = localStorage.getItem('prompter_script');
    if (s) document.getElementById('script-input').value = s;
    const sv = localStorage.getItem('prompter_speed');
    if (sv) { speed = parseFloat(sv); syncSpeedUI(); }
    const sz = localStorage.getItem('prompter_size');
    if (sz) { fontSize = parseInt(sz); syncSizeUI(); }
    const sw = localStorage.getItem('prompter_width');
    if (sw) setWidth(sw, true);
    const sa = localStorage.getItem('prompter_align');
    if (sa) setAlign(sa, true);
    const sc = localStorage.getItem('prompter_conf');
    if (sc !== null) setConfidence(sc === '1', true);
    const ssp = localStorage.getItem('prompter_spacing');
    if (ssp) setSpacing(ssp, true);
  });

  function syncSpeedUI() {
    document.getElementById('speed-slider').value = speed;
    document.getElementById('speed-val').textContent = speed.toFixed(1);
    document.getElementById('hud-speed').textContent = speed.toFixed(1);
  }
  function syncSizeUI() {
    document.getElementById('size-slider').value = fontSize;
    document.getElementById('size-val').textContent = fontSize;
    document.documentElement.style.setProperty('--font-size', fontSize + 'px');
  }

  // ── PWA ──
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault(); deferredPrompt = e;
    if (!localStorage.getItem('install_dismissed'))
      document.getElementById('install-banner').classList.add('visible');
  });
  document.getElementById('install-btn').onclick = async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt(); await deferredPrompt.userChoice;
    deferredPrompt = null;
    document.getElementById('install-banner').classList.remove('visible');
  };
  document.getElementById('install-dismiss').onclick = () => {
    localStorage.setItem('install_dismissed', '1');
    document.getElementById('install-banner').classList.remove('visible');
  };

  // ── EDITOR CONTROLS ──
  function setMode(m) {
    mode = m;
    document.getElementById('mode-auto').classList.toggle('active', m === 'auto');
    document.getElementById('mode-manual').classList.toggle('active', m === 'manual');
    document.getElementById('speed-control').style.display = m === 'auto' ? 'flex' : 'none';
  }

  function setWidth(w, silent) {
    contentWidth = WIDTH_MAP[w] || 760;
    document.documentElement.style.setProperty('--content-width', contentWidth + 'px');
    ['narrow','mid','wide'].forEach(k =>
      document.getElementById('width-' + k).classList.toggle('active', k === w));
    if (!silent) localStorage.setItem('prompter_width', w);
  }

  function setAlign(a, silent) {
    textAlign = a;
    document.documentElement.style.setProperty('--text-align', a);
    ['left','center'].forEach(k =>
      document.getElementById('align-' + k).classList.toggle('active', k === a));
    if (!silent) localStorage.setItem('prompter_align', a);
  }

  function setConfidence(on, silent) {
    confidenceOn = on;
    document.getElementById('conf-on').classList.toggle('active', on);
    document.getElementById('conf-off').classList.toggle('active', !on);
    if (!silent) localStorage.setItem('prompter_conf', on ? '1' : '0');
    if (!on) lineElements.forEach(el => el.className = 'script-line');
  }

  function setSpacing(s, silent) {
    lineSpacing = s;
    const lh = SPACING_MAP[s] || 1.58;
    document.documentElement.style.setProperty('--line-height', lh);
    ['tight','normal','loose'].forEach(k =>
      document.getElementById('spacing-' + k).classList.toggle('active', k === s));
    if (!silent) localStorage.setItem('prompter_spacing', s);
    // rebuild offsets if prompter is open
    if (lineElements.length) requestAnimationFrame(() => { recalcTotal(); buildLineOffsets(); });
  }

  function updateSpeed(val) {
    speed = parseFloat(val);
    document.getElementById('speed-val').textContent = parseFloat(val).toFixed(1);
    document.getElementById('hud-speed').textContent = parseFloat(val).toFixed(1);
    localStorage.setItem('prompter_speed', speed);
    updateTimeRemaining();
  }

  function updateSize(val) {
    fontSize = parseInt(val);
    document.getElementById('size-val').textContent = val;
    document.documentElement.style.setProperty('--font-size', val + 'px');
    localStorage.setItem('prompter_size', fontSize);
    manualStep = fontSize * LINES_PER_TAP * 1.58;
  }

  function adjustSpeed(delta) {
    speed = Math.min(5, Math.max(0.1, +(speed + delta).toFixed(1)));
    syncSpeedUI();
    localStorage.setItem('prompter_speed', speed);
    updateTimeRemaining();
    showHud();
  }

  function adjustSize(delta) {
    fontSize = Math.min(72, Math.max(20, fontSize + delta));
    syncSizeUI();
    localStorage.setItem('prompter_size', fontSize);
    manualStep = fontSize * LINES_PER_TAP * 1.58;
    requestAnimationFrame(() => { recalcTotal(); buildLineOffsets(); });
    showHud();
  }

  // ── TEXT → DISPLAY LINES ──
  // Splits text into teleprompter lines:
  // 1. Split on sentence endings (. ! ?)
  // 2. Hard-wrap any chunk still longer than MAX_CHARS at word boundaries
  const MAX_CHARS = 72;

  function textToLines(text) {
    const lines = [];

    // First split into paragraphs (blank lines preserved as spacers)
    const paragraphs = text.split(/\n/);

    paragraphs.forEach(para => {
      const trimmed = para.trim();
      if (!trimmed) {
        lines.push(''); // blank line spacer
        return;
      }

      // Split paragraph into sentences — keep the punctuation attached
      const sentences = trimmed.match(/[^.!?]+[.!?]+["']?|[^.!?]+$/g) || [trimmed];

      sentences.forEach(raw => {
        const sentence = raw.trim();
        if (!sentence) return;

        if (sentence.length <= MAX_CHARS) {
          lines.push(sentence);
        } else {
          // Hard-wrap at word boundaries
          const words = sentence.split(' ');
          let current = '';
          words.forEach(word => {
            if (!current) {
              current = word;
            } else if ((current + ' ' + word).length <= MAX_CHARS) {
              current += ' ' + word;
            } else {
              lines.push(current);
              current = word;
            }
          });
          if (current) lines.push(current);
        }
      });
    });

    return lines;
  }

  // ── START ──
  function startPrompter() {
    const text = document.getElementById('script-input').value.trim();
    if (!text) return;
    localStorage.setItem('prompter_script', text);

    const container = document.getElementById('script-lines');
    container.innerHTML = '';
    lineElements = [];

    textToLines(text).forEach(line => {
      const span = document.createElement('span');
      span.className = 'script-line';
      span.textContent = line || '\u00A0';
      container.appendChild(span);
      lineElements.push(span);
    });

    document.documentElement.style.setProperty('--font-size', fontSize + 'px');
    document.documentElement.style.setProperty('--content-width', contentWidth + 'px');
    document.documentElement.style.setProperty('--text-align', textAlign);
    document.documentElement.style.setProperty('--line-height', SPACING_MAP[lineSpacing] || 1.58);

    scrollPos = 0;
    applyScroll();

    document.getElementById('editor-screen').style.display = 'none';
    document.getElementById('prompter-screen').style.display = 'block';
    document.body.classList.toggle('manual-mode', mode === 'manual');

    requestAnimationFrame(() => {
      recalcTotal();
      buildLineOffsets();
      manualStep = fontSize * LINES_PER_TAP * 1.58;
      updateConfidenceLines();
      updateTimeRemaining();
      hidePauseIndicator();

      if (mode === 'auto') {
        isPlaying = true; updatePlayBtn(); startScrollLoop();
      } else {
        isPlaying = false; updatePlayBtn();
      }
      showHud();
    });

    document.getElementById('prompter-screen').addEventListener('mousemove', handleMouseMove);
    document.getElementById('scroll-container').addEventListener('click', handleCenterTap);
    document.addEventListener('keydown', handleKey);
    document.getElementById('scroll-container').addEventListener('touchstart', handleTouchStart, {passive:true});
    document.getElementById('scroll-container').addEventListener('touchend', handleTouchEnd, {passive:true});
  }

  function recalcTotal() {
    const content   = document.getElementById('scroll-content');
    const container = document.getElementById('scroll-container');
    totalHeight = Math.max(0, content.scrollHeight - container.clientHeight);
  }

  function buildLineOffsets() {
    lineOffsets = lineElements.map(el => el.offsetTop);
  }

  // ── SCROLL LOOP ──
  function startScrollLoop() {
    lastTime = null;
    animFrame = requestAnimationFrame(scrollStep);
  }

  function scrollStep(ts) {
    if (!isPlaying) return;
    if (lastTime === null) lastTime = ts;
    const delta = (ts - lastTime) / 1000;
    lastTime = ts;

    scrollPos += speed * 60 * delta;

    if (scrollPos >= totalHeight) {
      scrollPos = totalHeight;
      applyScroll(); updateProgress(); updateConfidenceLines();
      stopScroll(); showEndScreen();
      return;
    }

    applyScroll(); updateProgress(); updateConfidenceLines(); updateTimeRemaining();
    animFrame = requestAnimationFrame(scrollStep);
  }

  function applyScroll() {
    document.getElementById('scroll-content').style.transform =
      `translateX(-50%) translateY(${-scrollPos}px)`;
  }

  function updateProgress() {
    const pct = totalHeight > 0 ? (scrollPos / totalHeight) * 100 : 0;
    document.getElementById('progress-bar').style.width = pct + '%';
  }

  function stopScroll() {
    isPlaying = false;
    if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
    updatePlayBtn();
    showPauseIndicator();
  }

  // ── CONFIDENCE MODE ──
  function updateConfidenceLines() {
    if (!lineElements.length) return;
    const viewH   = document.getElementById('scroll-container').clientHeight;
    const readingY = scrollPos + viewH * 0.42;

    let activeIdx = 0;
    for (let i = 0; i < lineOffsets.length; i++) {
      if (lineOffsets[i] <= readingY) activeIdx = i;
      else break;
    }

    if (!confidenceOn) {
      lineElements.forEach(el => el.className = 'script-line');
      return;
    }

    lineElements.forEach((el, i) => {
      const dist = i - activeIdx;
      let cls = 'script-line ';
      if      (dist === 0)               cls += 'line-active';
      else if (dist >= -1 && dist <= 2)  cls += 'line-near';
      else if (dist >= -3 && dist <= 5)  cls += 'line-far';
      else                               cls += 'line-gone';
      el.className = cls;
    });
  }

  // ── TIME REMAINING ──
  function updateTimeRemaining() {
    const el = document.getElementById('time-remaining');
    if (!totalHeight || !isPlaying) { el.textContent = '—'; return; }
    const secsLeft = (totalHeight - scrollPos) / (speed * 60);
    const m = Math.floor(secsLeft / 60);
    const s = Math.floor(secsLeft % 60);
    el.textContent = m > 0 ? `${m}m ${s.toString().padStart(2,'0')}s` : `${s}s`;
  }

  // ── PLAY / PAUSE ──
  function togglePlayPause() {
    if (mode === 'manual' || isRewinding) return;
    if (isPlaying) {
      stopScroll();
      document.getElementById('time-remaining').textContent = '—';
    } else {
      if (scrollPos >= totalHeight) { restartScroll(); return; }
      isPlaying = true; updatePlayBtn(); hidePauseIndicator(); startScrollLoop();
    }
    showHud();
  }

  function handleCenterTap(e) {
    // Only handle mouse clicks — touch is handled by handleTouchEnd
    if (e.pointerType === 'touch') return;
    if (e.target.closest('#hud') || e.target.closest('#tap-left') || e.target.closest('#tap-right')) return;
    if (mode === 'auto') { togglePlayPause(); spawnTapFlash(e.clientX, e.clientY); }
  }

  let touchStartTime = 0;
  let touchStartY = 0;

  function handleTouchStart(e) {
    touchStartTime = Date.now();
    touchStartY = e.touches[0].clientY;
  }

  function handleTouchEnd(e) {
    if (e.target.closest('#hud') || e.target.closest('#tap-left') || e.target.closest('#tap-right')) return;
    const elapsed = Date.now() - touchStartTime;
    const movedY = e.changedTouches[0].clientY - touchStartY;
    // Only treat as a tap if quick (<250ms) and didn't scroll much (<10px)
    if (elapsed < 250 && Math.abs(movedY) < 10) {
      if (mode === 'auto') {
        togglePlayPause();
        spawnTapFlash(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
      }
    }
  }

  function updatePlayBtn() {
    document.getElementById('play-icon').style.display  = isPlaying ? 'none'  : 'block';
    document.getElementById('pause-icon').style.display = isPlaying ? 'block' : 'none';
  }

  // ── MANUAL ──
  // Smooth nudge — shared by manual taps and auto-mode arrow keys
  // step = fraction of viewport height to move
  let nudgeAnim = null;

  function getActiveLineIdx() {
    const viewH    = document.getElementById('scroll-container').clientHeight;
    const readingY = scrollPos + viewH * 0.42;
    let idx = 0;
    for (let i = 0; i < lineOffsets.length; i++) {
      if (lineOffsets[i] <= readingY) idx = i;
      else break;
    }
    return idx;
  }

  function nudgeScroll(direction, side) {
    let target;

    if (confidenceOn && lineOffsets.length) {
      // Move exactly one line forward or back
      const current = getActiveLineIdx();
      const nextIdx = Math.min(lineOffsets.length - 1, Math.max(0, current + direction));
      // Scroll so the target line sits at the reading position (42% down viewport)
      const viewH = document.getElementById('scroll-container').clientHeight;
      target = Math.min(totalHeight, Math.max(0, lineOffsets[nextIdx] - viewH * 0.42));
    } else {
      // Fallback: 28% viewport nudge when confidence mode is off
      const viewH = document.getElementById('scroll-container').clientHeight;
      target = Math.min(totalHeight, Math.max(0, scrollPos + direction * viewH * 0.28));
    }

    if (nudgeAnim) cancelAnimationFrame(nudgeAnim);

    const startPos  = scrollPos;
    const dist      = target - startPos;
    const duration  = 220; // snappier for line-by-line
    const startTime = performance.now();

    function animNudge(ts) {
      const p    = Math.min((ts - startTime) / duration, 1);
      const ease = 1 - Math.pow(1 - p, 3);
      scrollPos  = startPos + dist * ease;
      applyScroll(); updateProgress(); updateConfidenceLines();
      if (p < 1) {
        nudgeAnim = requestAnimationFrame(animNudge);
      } else {
        scrollPos = target;
        applyScroll(); updateProgress(); updateConfidenceLines();
        nudgeAnim = null;
        if (scrollPos >= totalHeight) showEndScreen();
      }
    }

    nudgeAnim = requestAnimationFrame(animNudge);
    if (side) spawnTapFlashCenter(side);
  }

  function manualForward() { nudgeScroll(1,  'right'); }
  function manualBack()     { nudgeScroll(-1, 'left');  }

  // ── RESTART with animated scroll-to-top ──
  function restartScroll() {
    if (isRewinding) return;
    const wasPlaying = isPlaying;
    stopScroll();
    hidePauseIndicator();
    hideEndScreen();

    if (scrollPos === 0) {
      // already at top, just resume
      if (mode === 'auto') { isPlaying = true; updatePlayBtn(); startScrollLoop(); }
      showHud(); return;
    }

    isRewinding = true;
    const overlay = document.getElementById('rewind-overlay');
    overlay.classList.add('active');
    setTimeout(() => overlay.classList.remove('active'), 800);

    const startPos  = scrollPos;
    const duration  = Math.min(900, Math.max(250, startPos * 0.4));
    const startTime = performance.now();

    function animRewind(ts) {
      const p    = Math.min((ts - startTime) / duration, 1);
      // ease-out cubic
      const ease = 1 - Math.pow(1 - p, 3);
      scrollPos  = startPos * (1 - ease);
      applyScroll(); updateProgress(); updateConfidenceLines();

      if (p < 1) {
        requestAnimationFrame(animRewind);
      } else {
        scrollPos = 0;
        applyScroll(); updateProgress(); updateConfidenceLines();
        isRewinding = false;
        if (mode === 'auto') {
          isPlaying = true; updatePlayBtn(); hidePauseIndicator();
          updateTimeRemaining(); startScrollLoop();
        }
      }
    }

    requestAnimationFrame(animRewind);
    showHud();
  }

  // ── EXIT ──
  function exitPrompter() {
    isRewinding = false;
    stopScroll();
    document.getElementById('prompter-screen').style.display = 'none';
    document.getElementById('editor-screen').style.display = 'flex';
    document.getElementById('end-screen').classList.remove('visible');
    document.getElementById('time-remaining').textContent = '—';
    document.removeEventListener('keydown', handleKey);
    document.getElementById('scroll-container').removeEventListener('click', handleCenterTap);
    document.getElementById('prompter-screen').removeEventListener('mousemove', handleMouseMove);
  }

  function showEndScreen() { document.getElementById('end-screen').classList.add('visible'); }
  function hideEndScreen()  { document.getElementById('end-screen').classList.remove('visible'); }

  // ── HUD ──
  function showHud() {
    const hud = document.getElementById('hud');
    hud.classList.remove('hidden');
    clearTimeout(hudTimeout);
    hudTimeout = setTimeout(() => hud.classList.add('hidden'), 3200);
    document.getElementById('prompter-screen').style.cursor = 'default';
  }

  let cursorHideTimeout = null;
  function handleMouseMove() {
    showHud();
    clearTimeout(cursorHideTimeout);
    cursorHideTimeout = setTimeout(() => {
      document.getElementById('prompter-screen').style.cursor = 'none';
    }, 3200);
  }

  function showPauseIndicator() { document.getElementById('pause-indicator').classList.add('visible'); }
  function hidePauseIndicator() { document.getElementById('pause-indicator').classList.remove('visible'); }

  // ── KEYBOARD ──
  function handleKey(e) {
    switch(e.code) {
      case 'Space':        e.preventDefault(); togglePlayPause(); break;
      case 'ArrowUp':      adjustSpeed(0.1); break;
      case 'ArrowDown':    adjustSpeed(-0.1); break;
      case 'ArrowRight':   nudgeScroll(1,  null); break;
      case 'ArrowLeft':    nudgeScroll(-1, null); break;
      case 'KeyR':         restartScroll(); break;
      case 'Escape':       exitPrompter(); break;
      case 'Equal': case 'NumpadAdd':      adjustSize(2); break;
      case 'Minus': case 'NumpadSubtract': adjustSize(-2); break;
    }
  }

  // ── TAP FLASH ──
  function spawnTapFlash(x, y) {
    const el = document.createElement('div');
    el.className = 'tap-flash';
    el.style.left = x + 'px'; el.style.top = y + 'px';
    document.getElementById('prompter-screen').appendChild(el);
    setTimeout(() => el.remove(), 400);
  }
  function spawnTapFlashCenter(side) {
    const sc = document.getElementById('prompter-screen');
    spawnTapFlash(
      side === 'right' ? sc.clientWidth * 0.75 : sc.clientWidth * 0.25,
      sc.clientHeight * 0.5
    );
  }

  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
</script>
</body>
</html>
